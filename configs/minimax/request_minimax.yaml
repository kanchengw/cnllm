request:
  method: "POST"
  headers:
    Content-Type: "application/json"
    Authorization: "Bearer ${api_key}"

required_fields:
  api_key:
    skip: true
  model: ~

one_of:
  messages_or_prompt:
    messages: ~
    prompt: ~

optional_fields:
  base_url:
    skip: true
    openai:
      default: "https://api.minimaxi.com"
      path: "v1/chat/completions"
    native:
      default: "https://api.minimaxi.com"
      path: "v1/text/chatcompletion_v2"
  fallback_models:
    skip: true
  timeout:
    skip: true
    default: 60.0
  max_retries:
    skip: true
    default: 3
  retry_delay:
    skip: true
    default: 1.0
  temperature: ~
  max_completion_tokens: ~
  max_tokens: 
    protocol: native
  stream_options: 
    protocol: native
  stream: ~
  top_p: ~
  tools: ~
  tool_choice: ~
  group_id:
    skip: true
    protocol: native

model_mapping:
  chat:
    minimax-m2: "MiniMax-M2"
    minimax-m2.1: "MiniMax-M2.1"
    minimax-m2.5: "MiniMax-M2.5"
    minimax-m2.7: "MiniMax-M2.7"
    minimax-m2.5-highspeed: "MiniMax-M2.5-highspeed"
    minimax-m2.7-highspeed: "MiniMax-M2.7-highspeed"

error_check:
  code_path: "base_resp.status_code"
  success_code: 0
  message_path: "base_resp.status_msg"
  auth_code: 1004
