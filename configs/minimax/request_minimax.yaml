request:
  method: "POST"
  headers:
    Content-Type: "application/json"
    Authorization: "Bearer ${api_key}"

required_fields:
  api_key:
    adapter: [chat, embedding]
    skip: true
  model:
    adapter: [chat, embedding]
  input:
    adapter: [embedding]
    map: "texts"

one_of:
  messages_or_prompt:
    messages: 
      adapter: [chat]
    prompt: 
      adapter: [chat]

optional_fields:
  base_url:
    adapter: [chat, embedding]
    skip: true
    chat:
      default: "https://api.minimaxi.com/v1"
      path: "text/chatcompletion_v2"
    embedding:
      default: "https://api.minimax.chat"
      path: "/v1/embeddings"
  fallback_models:
    adapter: [chat]
    skip: true
  group_id:
    adapter: [chat, embedding]
    skip: true
  timeout:
    adapter: [chat, embedding]
    skip: true
    default: 60.0
  max_retries:
    adapter: [chat, embedding]
    skip: true
    default: 3
  retry_delay:
    adapter: [chat, embedding]
    skip: true
    default: 1.0
  temperature:
    adapter: [chat]
  max_completion_tokens:
    adapter: [chat]
  stream:
    adapter: [chat]
  top_p:
    adapter: [chat]
  top_k:
    adapter: [chat]
  tools:
    adapter: [chat]
  tool_choice:
    adapter: [chat]
  thinking:
    adapter: [chat]
  presence_penalty:
    adapter: [chat]
  frequency_penalty:
    adapter: [chat]
  stop:
    adapter: [chat]
  mask:
    adapter: [chat]
  type:
    adapter: [embedding]
    default: "db"

model_mapping:
  chat:
    minimax-m2: "MiniMax-M2"
    minimax-m2.1: "MiniMax-M2.1"
    minimax-m2.5: "MiniMax-M2.5"
    minimax-m2.7: "MiniMax-M2.7"
  embedding:
    embo-01: "embo-01"

error_check:
  code_path: "base_resp.status_code"
  success_code: 0
  message_path: "base_resp.status_msg"
  auth_code: 1004
  error_codes:
    1000:
      type: "server_error"
      suggestion: "请稍后再试"
    1001:
      type: "timeout"
      suggestion: "请求超时，请稍后再试"
    1002:
      type: "rate_limit"
      suggestion: "请求频率超限，请稍后重试"
    1004:
      type: "authentication_error"
      suggestion: "请检查 API Key 是否正确"
    1008:
      type: "token_limit"
      suggestion: "余额不足，请检查账户余额"
    1013:
      type: "invalid_request_error"
      message: "非法字符超过10%"
    1024:
      type: "server_error"
      suggestion: "服务器内部错误，请稍后再试"
    1026:
      type: "content_filtered"
      suggestion: "输入内容涉敏，请调整输入内容"
    2013:
      type: "invalid_request_error"
      message: "输入格式信息不正常"
