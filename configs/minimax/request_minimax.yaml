request:
  method: "POST"
  headers:
    Content-Type: "application/json"
    Authorization: "Bearer ${api_key}"

required_fields:
  api_key:
    body: "__skip__"
  model: ""

one_of:
  messages_or_prompt:
    messages: ""
    prompt: ""

optional_fields:
  base_url:
    body: "__skip__"
    default: "https://api.minimaxi.com/v1"
    text: "text/chatcompletion_v2"
  fallback_models:
    body: "__skip__"
  organization:
    body: "__skip__"
    head: "group_id"
  timeout:
    body: "__skip__"
    default: 60.0
  max_retries:
    body: "__skip__"
    default: 3
  retry_delay:
    body: "__skip__"
    default: 1.0
  temperature: ""
  max_tokens:
    body: "max_completion_tokens"
  stream: ""
  top_p: ""
  top_k: ""
  tools: ""
  tool_choice: ""
  thinking: ""
  presence_penalty: ""
  frequency_penalty: ""
  stop: ""
  user: ""
  mask: ""

model_mapping:
  minimax-m2: "MiniMax-M2"
  minimax-m2.1: "MiniMax-M2.1"
  minimax-m2.5: "MiniMax-M2.5"
  minimax-m2.7: "MiniMax-M2.7"
