request:
  method: "POST"
  headers:
    Content-Type: "application/json"
    Authorization: "Bearer ${api_key}"

required_fields:
  api_key:
    adapter: [chat, embedding]
    skip: true
  model:
    adapter: [chat, embedding]

one_of:
  messages_or_prompt:
    messages: 
      adapter: [chat]
    prompt: 
      adapter: [chat]

optional_fields:
  base_url:
    adapter: [chat, embedding]
    skip: true
    chat:
      default: "https://api.deepseek.com/v1"
      path: "chat/completions"
  fallback_models:
    adapter: [chat]
    skip: true
  timeout:
    adapter: [chat, embedding]
    skip: true
    default: 60.0
  max_retries:
    adapter: [chat, embedding]
    skip: true
    default: 3
  retry_delay:
    adapter: [chat, embedding]
    skip: true
    default: 1.0
  temperature:
    adapter: [chat]
  top_p:
    adapter: [chat]
  max_tokens:
    adapter: [chat]
  stream:
    adapter: [chat]
  stop:
    adapter: [chat]
  n:
    adapter: [chat]
  tools:
    adapter: [chat]
  tool_choice:
    adapter: [chat]
  user:
    adapter: [chat]
  presence_penalty:
    adapter: [chat]
  frequency_penalty:
    adapter: [chat]
  response_format:
    adapter: [chat]
  thinking:
    adapter: [chat]
    map: "thinking"
    transform:
      true: {"type": "enabled"}
      false: {"type": "disabled"}
  logit_bias:
    adapter: [chat]

model_mapping:
  chat:
    deepseek-chat: "deepseek-chat"
    deepseek-reasoner: "deepseek-reasoner"
    deepseek-v4-pro: "deepseek-v4-pro"
    deepseek-v4-flash: "deepseek-v4-flash"

error_check:
  code_path: "error.type"
  success_code: null
  auth_code: 401
  message_path: "error.message"
  error_codes:
    invalid_authentication_error:
      type: "authentication_error"
      suggestion: "请检查 API Key 是否正确"
    authentication_error:
      type: "authentication_error"
      suggestion: "请检查 API Key 是否正确"
    rate_limit_error:
      type: "rate_limit"
      suggestion: "请求过于频繁，请稍后重试"
    invalid_request_error:
      type: "invalid_request_error"
      suggestion: "请检查请求参数是否正确"
    server_error:
      type: "server_error"
      suggestion: "服务器内部错误，请稍后重试"
    not_found_error:
      type: "invalid_request_error"
      suggestion: "模型或资源不存在"
    insufficient_quota_error:
      type: "rate_limit"
      suggestion: "账户配额不足，请充值"
    content_filter:
      type: "content_filtered"
      suggestion: "内容被过滤，请更换输入后重试"
    access_denied_error:
      type: "authentication_error"
      suggestion: "禁止访问，请检查权限"
